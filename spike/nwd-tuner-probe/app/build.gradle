plugins { id 'com.android.application' }

android {
    namespace 'com.ninthfreak.nwdprobe'
    compileSdk 34

    defaultConfig {
        applicationId "com.ninthfreak.nwdprobe"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    // AGP 8 requires this to compile the reconstructed .aidl files
    buildFeatures { aidl true }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    buildTypes { release { minifyEnabled false } }
}
