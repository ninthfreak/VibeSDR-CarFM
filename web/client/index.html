<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VibeSDR</title>
<style>
/* Design tokens — the same values as src/constants/theme.ts, which were
   themselves transcribed from the original CSS. Amber-on-black. */
:root {
  --bg:            #080601;
  --bar-bg:        rgba(10,8,4,0.84);
  --bar-border:    rgba(255,160,0,0.22);
  --btn-bg:        rgba(20,10,0,0.75);
  --pill-bg:       rgb(20,10,0);
  --btn-border:    rgba(255,160,0,0.35);
  --btn-text:      #ffb833;
  --btn-active-bg: rgba(255,200,0,0.10);
  --btn-active-bdr:rgba(255,229,102,0.55);
  --btn-active-tx: #ffe566;
  --freq:          #ffb833;
  --unit:          #886600;
  --amber:         #ffb833;
  --text-dim:      rgba(255,160,0,0.45);
  --meter-track:   rgba(105,98,82,0.30);
  --peak-line:     rgba(255,245,200,0.92);
  --red:           #e05050;
  --green:         #28a745;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; height: 100%;
  background: var(--bg);
  color: var(--btn-text);
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Splash / connect ─────────────────────────────────────────────────────── */
#splash {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 18px; background: var(--bg);
}
#splash.hidden { display: none; }
#splash h1 {
  margin: 0; font-size: 34px; letter-spacing: 6px; font-weight: 600;
  color: var(--amber); text-shadow: 0 0 24px rgba(255,170,0,0.35);
}
#splash .sub { color: var(--text-dim); font-size: 12px; letter-spacing: 2px; margin-top: -10px; }
#splash form { display: flex; flex-direction: column; gap: 10px; width: 320px; margin-top: 6px; }
#splash label { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }
#splash input {
  background: var(--pill-bg); border: 1px solid var(--btn-border);
  color: var(--freq); padding: 10px 12px; border-radius: 6px;
  font-family: inherit; font-size: 15px; letter-spacing: 1px;
}
#splash input:focus { outline: none; border-color: var(--btn-active-bdr); }
#splash .row { display: flex; gap: 8px; }
#splash .row > * { flex: 1; }
#splash button {
  background: var(--btn-bg); border: 1px solid var(--btn-border);
  color: var(--btn-text); padding: 11px 14px; border-radius: 6px;
  font-family: inherit; font-size: 13px; letter-spacing: 1px; cursor: pointer;
}
#splash button:hover { background: var(--btn-active-bg); border-color: var(--btn-active-bdr); color: var(--btn-active-tx); }
#splash button[disabled] { opacity: 0.45; cursor: default; }
#splashMsg { min-height: 18px; font-size: 12px; color: var(--red); text-align: center; }
#splashMsg.info { color: var(--text-dim); }

/* ── App shell ────────────────────────────────────────────────────────────── */
#app { display: none; flex-direction: column; height: 100%; }
#app.live { display: flex; }

/* Frequency scale — its own strip so labels never fight the palette. */
#scale { display: block; width: 100%; height: 26px; flex: 0 0 26px; background: #000; }

#wfWrap { position: relative; flex: 1 1 auto; min-height: 0; }
#wf { display: block; width: 100%; height: 100%; cursor: crosshair; }
#wf.panning { cursor: grabbing; }

/* ── Control bar — mirrors ControlsBar.tsx, drums swapped for buttons ─────── */
#bar {
  flex: 0 0 auto; background: var(--bar-bg); border-top: 1px solid var(--bar-border);
  padding: 10px 14px; display: flex; flex-direction: column; gap: 10px;
}
.barRow { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

/* Signal meter + freq/mode pill (row 1) */
#sigWrap { flex: 1 1 220px; min-width: 160px; }
#sig { position: relative; height: 8px; border-radius: 4px; background: var(--meter-track); overflow: hidden; }
#sigFill { position: absolute; inset: 0 auto 0 0; width: 0%; background: linear-gradient(90deg, var(--green), var(--amber), var(--red)); }
#sigPeak { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--peak-line); left: 0; }
#sigLabel { margin-top: 4px; font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }

#pill {
  display: flex; align-items: baseline; gap: 10px;
  background: var(--pill-bg); border: 1px solid var(--btn-border);
  border-radius: 8px; padding: 6px 14px; cursor: pointer;
}
#pill:hover { border-color: var(--btn-active-bdr); }
#freq { font-size: 26px; color: var(--freq); letter-spacing: 2px; font-variant-numeric: tabular-nums; }
#freqUnit { font-size: 12px; color: var(--unit); }
#modeLbl { font-size: 13px; color: var(--amber); letter-spacing: 2px; }
#stereo { font-size: 10px; color: var(--green); border: 1px solid var(--green); border-radius: 3px; padding: 0 3px; display: none; }
#stereo.on { display: inline; }

/* VFO: step-tied left/right arrows — the desktop stand-in for the tuning drum. */
#vfo { display: flex; gap: 6px; align-items: center; }
#vfo .arrow { font-size: 15px; padding: 7px 16px; }
#stepBtn { min-width: 74px; }

button.btn {
  background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--btn-text);
  padding: 7px 12px; border-radius: 6px; font-family: inherit; font-size: 12px;
  letter-spacing: 1px; cursor: pointer;
}
button.btn:hover { background: var(--btn-active-bg); border-color: var(--btn-active-bdr); color: var(--btn-active-tx); }
button.btn.on { background: var(--btn-active-bg); border-color: var(--btn-active-bdr); color: var(--btn-active-tx); }

/* Recording: unmistakable, and it pulses so you can't leave it running by accident. */
#recBtn.rec {
  color: var(--red); border-color: var(--red);
  background: rgba(224,80,80,0.12);
  animation: recPulse 1.4s ease-in-out infinite;
}
@keyframes recPulse { 50% { background: rgba(224,80,80,0.3); } }
#recTime { color: var(--red); font-variant-numeric: tabular-nums; min-width: 42px; }

.group { display: flex; gap: 4px; align-items: center; }
.sep { width: 1px; height: 22px; background: var(--bar-border); }
.lbl { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }

input[type=range] { accent-color: var(--amber); width: 110px; }

/* ── Menu drawer (Radio / Audio / Display) ────────────────────────────────── */
#menu {
  position: fixed; top: 0; right: 0; bottom: 0; width: 340px; z-index: 50;
  background: rgba(8,6,2,0.97); border-left: 1px solid var(--bar-border);
  padding: 16px; overflow-y: auto;
  transform: translateX(100%); transition: transform .18s ease-out;
}
#menu.open { transform: translateX(0); }
#menu h2 {
  margin: 18px 0 8px; font-size: 11px; letter-spacing: 2px; color: var(--text-dim);
  font-weight: 500; border-bottom: 1px solid var(--bar-border); padding-bottom: 5px;
}
#menu h2:first-of-type { margin-top: 4px; }
#menuHead { display: flex; align-items: center; justify-content: space-between; }
#menuHead span { font-size: 13px; letter-spacing: 3px; color: var(--amber); }
.mrow {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; padding: 7px 0; font-size: 12px;
}
.mrow label { color: var(--btn-text); flex: 0 0 auto; }
.mrow .val { color: var(--unit); font-size: 11px; min-width: 56px; text-align: right; font-variant-numeric: tabular-nums; }
.mrow input[type=range] { flex: 1 1 auto; width: auto; min-width: 90px; }
.mrow select { flex: 1 1 auto; }
.seg { display: flex; gap: 3px; }
.seg button { padding: 5px 9px; font-size: 11px; }
select.btn { padding: 6px 8px; }

#status { margin-left: auto; font-size: 10px; color: var(--text-dim); letter-spacing: 1px; text-align: right; }
#status .bad { color: var(--red); }
#rds { font-size: 11px; color: var(--amber); letter-spacing: 1px; min-height: 14px; }
#rds .rt { color: var(--text-dim); }
</style>

<div id="splash">
  <h1>VIBESDR</h1>
  <div class="sub">VIBESERVER · WEB CLIENT</div>
  <form id="connForm" autocomplete="off">
    <label for="host">SERVER</label>
    <input id="host" placeholder="192.168.86.134:48000" spellcheck="false">
    <label for="pin">PIN <span style="color:var(--unit)">(if required)</span></label>
    <input id="pin" placeholder="······" inputmode="numeric">
    <div class="row">
      <button type="submit" id="btnConnect">CONNECT</button>
      <button type="button" id="btnSaveConnect">SAVE &amp; CONNECT</button>
    </div>
  </form>
  <div id="splashMsg"></div>
</div>

<div id="app">
  <canvas id="scale"></canvas>
  <div id="wfWrap"><canvas id="wf"></canvas></div>

  <div id="bar">
    <div class="barRow">
      <div id="sigWrap">
        <div id="sig"><div id="sigFill"></div><div id="sigPeak"></div></div>
        <div id="sigLabel">—</div>
      </div>
      <div id="pill" title="Click to enter a frequency">
        <span id="freq">—</span><span id="freqUnit">MHz</span>
        <span id="modeLbl">NFM</span><span id="stereo">ST</span>
      </div>
      <div id="rds"></div>
      <div id="status">—</div>
    </div>

    <div class="barRow">
      <div id="vfo">
        <button class="btn arrow" id="tuneDown" title="Tune down one step">◀</button>
        <button class="btn" id="stepBtn" title="Tuning step — click to change">1kHz</button>
        <button class="btn arrow" id="tuneUp" title="Tune up one step">▶</button>
      </div>
      <div class="sep"></div>
      <div class="group" id="modes"></div>
      <div class="sep"></div>
      <div class="group">
        <span class="lbl">ZOOM</span>
        <button class="btn" id="zoomOut">−</button>
        <button class="btn" id="zoomIn">+</button>
        <button class="btn" id="zoomReset">FIT</button>
      </div>
      <div class="sep"></div>
      <div class="group">
        <button class="btn on" id="lockBtn" title="View follows the VFO">LOCK</button>
      </div>
      <div class="sep"></div>
      <div class="group">
        <span class="lbl">VOL</span>
        <input type="range" id="vol" min="0" max="100" value="80">
        <button class="btn" id="muteBtn">MUTE</button>
      </div>
      <div class="sep"></div>
      <div class="group">
        <button class="btn" id="recBtn" title="Record audio to a WAV file">● REC</button>
        <span class="lbl" id="recTime"></span>
      </div>
      <div class="sep"></div>
      <button class="btn" id="menuBtn">MENU</button>
    </div>
  </div>
</div>

<div id="menu">
  <div id="menuHead">
    <span>MENU</span>
    <button class="btn" id="menuClose">CLOSE</button>
  </div>

  <h2>RADIO</h2>
  <div class="mrow">
    <label for="gain">GAIN</label>
    <input type="range" id="gain" min="0" max="0" value="0">
    <span class="val" id="gainVal">—</span>
  </div>
  <div class="mrow">
    <label>AUTO GAIN</label>
    <div class="seg"><button class="btn" id="gainAuto">AUTO</button></div>
  </div>
  <div class="mrow">
    <label for="rate">SAMPLE RATE</label>
    <select id="rate" class="btn"></select>
  </div>
  <div class="mrow">
    <label for="ppm">PPM</label>
    <input type="range" id="ppm" min="-50" max="50" value="0">
    <span class="val" id="ppmVal">0</span>
  </div>
  <div class="mrow">
    <label>BIAS-T</label>
    <div class="seg"><button class="btn" id="biasT">OFF</button></div>
  </div>
  <div class="mrow">
    <label>DIGITAL AGC</label>
    <div class="seg"><button class="btn" id="agc">OFF</button></div>
  </div>
  <div class="mrow">
    <label>DIRECT SAMPLING</label>
    <div class="seg" id="dsSeg">
      <button class="btn on" data-ds="0">OFF</button>
      <button class="btn" data-ds="1">I</button>
      <button class="btn" data-ds="2">Q</button>
    </div>
  </div>

  <h2>AUDIO</h2>
  <div class="mrow">
    <label for="sql">SQUELCH</label>
    <input type="range" id="sql" min="-100" max="-20" value="-100">
    <span class="val" id="sqlVal">OFF</span>
  </div>
  <div class="mrow">
    <label for="nr">NOISE REDUCTION</label>
    <input type="range" id="nr" min="0" max="100" value="0">
    <span class="val" id="nrVal">OFF</span>
  </div>
  <div class="mrow">
    <label>AUTO NOTCH</label>
    <div class="seg"><button class="btn" id="notch">OFF</button></div>
  </div>
  <div class="mrow">
    <label>FM DE-EMPHASIS</label>
    <div class="seg" id="deemphSeg">
      <button class="btn" data-tau="0">OFF</button>
      <button class="btn on" data-tau="50">50µs</button>
      <button class="btn" data-tau="75">75µs</button>
    </div>
  </div>
  <div class="mrow">
    <label>WFM STEREO</label>
    <div class="seg"><button class="btn on" id="stereoBtn">ON</button></div>
  </div>

  <h2>DISPLAY</h2>
  <div class="mrow">
    <label for="palette">PALETTE</label>
    <select id="palette" class="btn"></select>
  </div>
  <div class="mrow">
    <label for="specRatio">SPECTRUM</label>
    <input type="range" id="specRatio" min="0" max="60" value="25">
    <span class="val" id="specRatioVal">25%</span>
  </div>
  <div class="mrow">
    <label for="bright">BRIGHTNESS</label>
    <input type="range" id="bright" min="-20" max="20" value="0">
    <span class="val" id="brightVal">0</span>
  </div>
  <div class="mrow">
    <label for="contrast">CONTRAST</label>
    <input type="range" id="contrast" min="-10" max="10" value="0">
    <span class="val" id="contrastVal">0</span>
  </div>
  <div class="mrow">
    <label for="sharp">SHARPNESS</label>
    <input type="range" id="sharp" min="0" max="10" value="0">
    <span class="val" id="sharpVal">0</span>
  </div>
  <div class="mrow">
    <label for="smooth">SMOOTHING</label>
    <input type="range" id="smooth" min="1" max="10" value="5">
    <span class="val" id="smoothVal">5</span>
  </div>
  <div class="mrow">
    <label>PEAK HOLD</label>
    <div class="seg"><button class="btn on" id="peakHold">ON</button></div>
  </div>
</div>
<script type="module" src="./src/main.ts"></script>
